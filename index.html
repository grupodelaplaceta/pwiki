
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wiki de la Placeta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            text-rendering: optimizeLegibility;
        }

        /* Prevent zoom on iOS inputs */
        input, select, textarea {
            font-size: 16px !important;
        }
        @media (min-width: 768px) {
            input, select, textarea {
                font-size: 14px !important;
            }
        }

        .wiki-content {
            line-height: 1.7;
            font-size: 1rem;
        }

        .wiki-content h2 {
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 0.5rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 800;
            color: #0f172a;
            font-size: 1.5rem;
            letter-spacing: -0.025em;
        }

        .wiki-content h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            color: #1e293b;
            letter-spacing: -0.015em;
        }

        .wiki-content p {
            margin-bottom: 1.25rem;
        }

        .wiki-link {
            color: #10b981;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .wiki-link:hover {
            color: #059669;
            text-decoration: underline;
        }

        .norm-badge {
            background: #ffffff;
            color: #64748b;
            padding: 0.25rem 0.6rem;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            border: 1px solid #e2e8f0;
            display: inline-flex;
            align-items: center;
            font-family: monospace;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            margin: 0 0.1rem;
        }

        .snippet-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-left: 5px solid #10b981;
            padding: 1.25rem;
            margin: 2rem 0;
            border-radius: 12px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .wiki-card { box-shadow: none !important; border: none !important; width: 100% !important; margin: 0 !important; }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        /* Smooth transitions */
        .transition-all {
            transition-duration: 200ms;
        }

        /* Active states for mobile touch */
        @media (max-width: 1024px) {
            button:active {
                transform: scale(0.98);
                opacity: 0.8;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.42.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
