<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WikiGov Placeta - Sistema Institucional</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/xd6DTcFQ/faviwiki.png">
    <script>
      // Shim para variables de entorno sin IA
      window.process = { env: { PASSWORD: "" } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --wiki-bg: #f8f9fa;
            --wiki-border: #a2a9b1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #202122;
            -webkit-font-smoothing: antialiased;
        }

        .heading-font { font-family: 'Outfit', sans-serif; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        @media print {
            @page { size: A4; margin: 2cm; }
            .no-print, header, aside, footer, button, nav { display: none !important; }
            #root, main { display: block !important; width: 100% !important; overflow: visible !important; }
            .wiki-card { box-shadow: none !important; border: none !important; margin: 0 !important; padding: 0 !important; }
            .infobox { width: 300px !important; float: right !important; margin-left: 20px !important; border: 1px solid #aaa !important; }
        }

        .wiki-content h2 {
            font-family: 'Outfit', sans-serif;
            border-bottom: 1px solid var(--wiki-border);
            padding-bottom: 0.3rem;
            margin-top: 2rem;
            margin-bottom: 0.8rem;
            font-weight: 700;
            font-size: 1.5rem;
            color: #000;
        }

        .wiki-content h3 {
            font-weight: 700;
            font-size: 1.2rem;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .wiki-link { color: #3366cc; cursor: pointer; text-decoration: none; }
        .wiki-link:hover { text-decoration: underline; }
        
        .infobox { 
            background: #f8f9fa; 
            border: 1px solid #a2a9b1; 
            padding: 1rem; 
            font-size: 0.85rem;
            width: 100%;
            max-width: 320px;
        }
        
        .norm-badge {
            background: #eaecf0;
            border: 1px solid #c8ccd1;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.8rem;
            font-weight: bold;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body class="overflow-hidden">
    <div id="root"></div>
</body>
</html>
