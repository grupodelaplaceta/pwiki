<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WikiGov Placeta - Sistema Institucional</title>
    <script>
      // Shim crítico para evitar errores de referencia en el navegador
      window.process = { env: { API_KEY: "", PASSWORD: "" } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }

        .heading-font { font-family: 'Outfit', sans-serif; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        @media print {
            @page { size: A4; margin: 2cm; }
            .no-print, header, aside, footer, button { display: none !important; }
            #root, main { display: block !important; width: 100% !important; overflow: visible !important; }
            .wiki-card { box-shadow: none !important; border: none !important; }
        }

        .wiki-content h2 {
            font-family: 'Outfit', sans-serif;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.5rem;
            margin-top: 2.5rem;
            margin-bottom: 1.25rem;
            font-weight: 800;
            font-size: 1.75rem;
            color: #0f172a;
        }
        .wiki-link { color: var(--primary); font-weight: 700; cursor: pointer; text-decoration: underline; text-decoration-color: #d1fae5; text-underline-offset: 4px; }
        .infobox { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
